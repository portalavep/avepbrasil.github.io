<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redirecionando…</title>

  <!-- Immediate client-side redirect -->
  <meta http-equiv="refresh" content="0; url=https://sites.google.com/avepbrasil.com.br/portalavep">

  <!-- Prefer search engines not index this page as duplicate content -->
  <meta name="robots" content="noindex">

  <!-- Canonical: tells crawlers the preferred URL -->
  <link rel="canonical" href="https://sites.google.com/avepbrasil.com.br/portalavep">

  <script>
    // JavaScript fallback redirect (helps some browsers)
    (function () {
      var url = "https://sites.google.com/avepbrasil.com.br/portalavep";
      try { window.location.replace(url); } catch (e) { window.location = url; }
    })();
  </script>
</head>
<body>
  <p>Se o redirecionamento não acontecer automaticamente, <a href="https://sites.google.com/avepbrasil.com.br/portalavep">clique aqui</a>.</p>
</body>
</html>
